services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: uv run alembic upgrade head
    restart: "no"
    environment:
      APP_API_KEY: change-me
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      APP_WEBHOOK_TIMEOUT_SECONDS: "5"
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8000
    environment:
      APP_API_KEY: change-me
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      APP_WEBHOOK_TIMEOUT_SECONDS: "5"
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  consumer:
    build: .
    command: uv run faststream run consumer_app:app
    environment:
      APP_API_KEY: change-me
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      APP_WEBHOOK_TIMEOUT_SECONDS: "5"
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  outbox-worker:
    build: .
    command: uv run python src/outbox_worker_app.py
    environment:
      APP_API_KEY: change-me
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      APP_WEBHOOK_TIMEOUT_SECONDS: "5"
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
